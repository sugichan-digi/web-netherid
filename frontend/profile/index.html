    <main class="mp-main">

      <h2 class="mp-page-title">ユーザー情報変更</h2>

      <!-- タブバー -->
      <div class="mp-tab-bar" role="tablist">
        <button class="mp-tab mp-tab--active" data-tab="basic" role="tab" aria-selected="true">基本情報</button>
        <button class="mp-tab" data-tab="email" role="tab" aria-selected="false">メールアドレス</button>
        <button class="mp-tab" data-tab="password" role="tab" aria-selected="false">パスワード</button>
      </div>

      <!-- ===== タブ：基本情報 ===== -->
      <div class="mp-tab-panel mp-tab-panel--active" data-panel="basic">

        <div class="mp-info-bubble">
          ネザーIDに登録している基本情報を変更できます。<br>
          氏名・住所などの情報は各サービスのご利用に使われます。
        </div>

        <!-- 基本情報カード -->
        <div class="card" style="margin-bottom:var(--space-5);">
          <div class="card-header">
            <h3 class="heading-md heading--panel">基本情報</h3>
          </div>
          <form id="js-profile-form" novalidate>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label" for="name">
                  お名前（ハンドルネーム可）
                  <span class="required">*</span>
                </label>
                <input type="text" id="name" name="name" class="form-input" placeholder="山田太郎" autocomplete="name">
              </div>

              <!--
              <div class="form-group">
                <label class="form-label">属性</label>

                  <label class="form-check">
                    <input type="radio" name="account_type" value="personal" checked>
                    <span class="form-check-label">個人</span>
                  </label>
                  <label class="form-check">
                    <input type="radio" name="account_type" value="corporate">
                    <span class="form-check-label">法人</span>
                  </label>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="phone">電話番号</label>
                <input type="tel" id="phone" name="phone" class="form-input" placeholder="09012345678" autocomplete="tel" style="max-width:240px;">
                <span class="form-hint">ハイフンなしで入力してください</span>
              </div>

              <div id="js-profile-form-error" class="alert alert-danger" style="display:none;"></div>
            </div>
            <div class="card-footer">
              <button type="submit" class="btn btn-primary" id="js-profile-save-btn">変更を保存する</button>
            </div>
          </form>
        </div>

        <!-- 住所カード -->
        <div class="card">
          <div class="card-header">
            <h3 class="heading-md heading--panel">住所</h3>
          </div>
          <form id="js-address-form" novalidate>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label" for="postal-code">郵便番号</label>
                <div style="display:flex;gap:var(--space-3);align-items:flex-start;">
                  <input type="text" id="postal-code" name="postal_code" class="form-input" placeholder="1000001" maxlength="7" style="max-width:140px;">
                  <button type="button" class="btn btn-outline" id="js-autofill-address" style="white-space:nowrap;flex-shrink:0;">
                    住所を自動入力
                  </button>
                </div>
                <span class="form-hint">ハイフンなしで7桁入力してください</span>
                <span class="form-error" id="js-postal-error" style="display:none;"></span>
              </div>

              <div class="form-group">
                <label class="form-label" for="prefecture">都道府県</label>
                <select id="prefecture" name="prefecture" class="form-input form-select" style="max-width:200px;">
                  <option value="">選択してください</option>
                  <option value="北海道">北海道</option>
                  <option value="青森県">青森県</option>
                  <option value="岩手県">岩手県</option>
                  <option value="宮城県">宮城県</option>
                  <option value="秋田県">秋田県</option>
                  <option value="山形県">山形県</option>
                  <option value="福島県">福島県</option>
                  <option value="茨城県">茨城県</option>
                  <option value="栃木県">栃木県</option>
                  <option value="群馬県">群馬県</option>
                  <option value="埼玉県">埼玉県</option>
                  <option value="千葉県">千葉県</option>
                  <option value="東京都">東京都</option>
                  <option value="神奈川県">神奈川県</option>
                  <option value="新潟県">新潟県</option>
                  <option value="富山県">富山県</option>
                  <option value="石川県">石川県</option>
                  <option value="福井県">福井県</option>
                  <option value="山梨県">山梨県</option>
                  <option value="長野県">長野県</option>
                  <option value="岐阜県">岐阜県</option>
                  <option value="静岡県">静岡県</option>
                  <option value="愛知県">愛知県</option>
                  <option value="三重県">三重県</option>
                  <option value="滋賀県">滋賀県</option>
                  <option value="京都府">京都府</option>
                  <option value="大阪府">大阪府</option>
                  <option value="兵庫県">兵庫県</option>
                  <option value="奈良県">奈良県</option>
                  <option value="和歌山県">和歌山県</option>
                  <option value="鳥取県">鳥取県</option>
                  <option value="島根県">島根県</option>
                  <option value="岡山県">岡山県</option>
                  <option value="広島県">広島県</option>
                  <option value="山口県">山口県</option>
                  <option value="徳島県">徳島県</option>
                  <option value="香川県">香川県</option>
                  <option value="愛媛県">愛媛県</option>
                  <option value="高知県">高知県</option>
                  <option value="福岡県">福岡県</option>
                  <option value="佐賀県">佐賀県</option>
                  <option value="長崎県">長崎県</option>
                  <option value="熊本県">熊本県</option>
                  <option value="大分県">大分県</option>
                  <option value="宮崎県">宮崎県</option>
                  <option value="鹿児島県">鹿児島県</option>
                  <option value="沖縄県">沖縄県</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="city">市区町村</label>
                <input type="text" id="city" name="city" class="form-input" placeholder="千代田区" autocomplete="address-level2">
              </div>

              <div class="form-group">
                <label class="form-label" for="street">番地</label>
                <input type="text" id="street" name="street" class="form-input" placeholder="千代田1-1" autocomplete="address-line1">
              </div>

              <div class="form-group">
                <label class="form-label" for="building">
                  建物名・部屋番号
                  <span class="optional">任意</span>
                </label>
                <input type="text" id="building" name="building" class="form-input" placeholder="ネザービル 101号室" autocomplete="address-line2">

      <!-- ===== タブ：メールアドレス ===== -->
      <div class="mp-tab-panel" data-panel="email">

        <div class="mp-info-bubble">
          メールアドレスを変更すると、新しいアドレスに確認メールが送信されます。<br>
          メール内のリンクをクリックすることで変更が完了します。
        </div>

        <div class="card">
          <div class="card-header">
            <h3 class="heading-md heading--panel">メールアドレス変更</h3>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label" for="current-email">現在のメールアドレス</label>
              <input type="email" id="current-email" class="form-input" disabled placeholder="読み込み中...">
            </div>
            <div class="form-group">
              <label class="form-label" for="new-email">
                新しいメールアドレス
                <span class="required">*</span>
              </label>
              <input type="email" id="new-email" name="new-email" class="form-input" placeholder="new@example.com" autocomplete="email">
              <span class="form-error" id="js-email-change-error" style="display:none;"></span>
            </div>
          </div>
          <div class="card-footer">
            <button type="button" class="btn btn-primary" id="js-change-email-btn">変更する</button>
          </div>
        </div>

      </div>

      <!-- ===== タブ：パスワード ===== -->
      <div class="mp-tab-panel" data-panel="password">

        <div class="mp-info-bubble">
          パスワードを変更します。現在のパスワードを確認のうえ、新しいパスワードを入力してください。<br>
          パスワードは8文字以上で設定してください。
        </div>

        <div class="card">
          <div class="card-header">
            <h3 class="heading-md heading--panel">パスワード変更</h3>
          </div>
          <form id="js-password-form" novalidate>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label" for="current-password">
                  現在のパスワード
                  <span class="required">*</span>
                </label>
                <div class="profile-pw-input-wrap">
                  <input type="password" id="current-password" class="form-input" autocomplete="current-password">
                  <button type="button" class="js-toggle-pw btn-icon" data-target="current-password" aria-label="パスワードを表示">
