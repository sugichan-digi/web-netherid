    <main class="mp-main">

      <h2 class="mp-page-title">マイページ</h2>

      <!-- ウェルカムバナー -->
      <div class="mp-welcome-wrap">
        <div class="mp-welcome-bubble">
          <p class="mp-welcome-text">
            ようこそ、<strong id="js-username">---</strong> さん！<br>
            ネザーIDでは各サービスで利用するユーザー情報を一元管理しています。<br>
            ユーザー情報の変更は「マイページ」メニューから、各サービスのご利用はサービスサイトからどうぞ。
          </p>
        </div>
      </div>

      <!-- ご利用可能サービス一覧 -->
      <section class="mp-section">
        <h3 class="mp-section-title">ご利用可能サービス一覧</h3>
        <ul class="mp-services-grid" id="js-services-grid">
          <!-- script.js で描画 -->
        </ul>
      </section>

      <!-- お知らせ一覧 -->
      <section class="mp-section">
        <h3 class="mp-section-title">お知らせ一覧</h3>

        <!-- タブ -->
        <div class="mp-notif-tabs-wrap">
          <div class="mp-notif-tabs" role="tablist">
            <button class="mp-notif-tab mp-notif-tab--active" data-filter="all" role="tab">全て</button>
            <button class="mp-notif-tab" data-filter="subsuku" role="tab">サブスク管理人</button>
            <button class="mp-notif-tab" data-filter="lunchmap" role="tab">ランチマップ</button>
          </div>
          <!-- 通知リスト -->
          <div class="mp-notif-list" id="js-notif-list">
            <!-- script.js で描画 -->
          </div>
          <div class="mp-notif-more">
            <a href="/notification/" class="btn btn-outline btn-sm">お知らせ一覧をもっと見る</a>
          </div>
        </div>
      </section>
