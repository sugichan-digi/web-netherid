    <!-- ===== メインコンテンツ ===== -->
    <main class="mp-main">

      <h2 class="mp-page-title">退会手続き</h2>

      <!-- インフォバブル -->
      <div class="mp-info-bubble">
        ネザーIDの退会手続きページです。<br>
        退会すると、すべてのネザーWEBサービスがご利用いただけなくなります。<br>
        退会時に残存している「ネザーポイント」「売上金」は放棄されます。<br>
        <br>
        <strong id="js-point-summary" style="color:var(--primary);">
          保有ネザーポイント： -- RP / 売上金（未出金）： -- 円
        </strong>
      </div>

      <!-- 退会ボタン・ブロック理由 -->
      <div class="mp-withdraw-center">
        <button type="button" class="btn btn-primary mp-withdraw-btn" id="js-deactivate-btn">
          退会する
        </button>

        <!-- ブロック理由（API 実装後に表示） -->
        <div class="mp-block-reasons" id="js-block-reasons" style="display:none;">
          <div class="mp-block-reasons-title">以下の理由により退会処理を行うことができません。</div>
          <ul class="mp-block-reasons-list" id="js-block-reasons-list"></ul>
        </div>
      </div>

    </main>
  </div>

  <!-- 退会確認モーダル -->
  <div class="modal-overlay" id="js-deactivate-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <div style="width:36px;height:36px;background:var(--danger-light);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <h2 class="modal-title" id="modal-title" style="color:var(--danger);">本当に退会しますか？</h2>
        </div>
        <button type="button" class="modal-close" id="js-modal-close" aria-label="閉じる">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="alert alert-danger">
          <div class="alert-content">
            <p style="font-size:14px;line-height:1.7;">
              退会すると、このアカウントのすべてのデータが削除されます。この操作は取り消せません。
            </p>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="deactivate-email-confirm">
            確認のため、登録中のメールアドレスを入力してください
            <span class="required">*</span>
          </label>
          <input
            type="email"
            id="deactivate-email-confirm"
            class="form-input"
            placeholder="your@email.com"
            autocomplete="off"
          >
          <span class="form-hint">メールアドレスが一致した場合のみ退会できます</span>
          <span class="form-error" id="js-modal-email-error" style="display:none;"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="js-modal-cancel">キャンセル</button>
        <button type="button" class="btn btn-danger" id="js-modal-confirm" disabled>
          退会する
        </button>
      </div>
    </div>
  </div>
