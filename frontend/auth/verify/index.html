<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールアドレスの認証 — ネザーID</title>
  <script src="/jquery-4.0.0.min.js"></script>
  <script>
    (function () {
      var n = new Date();
      var v = n.getFullYear() +
        ("00" + (n.getMonth() + 1)).slice(-2) +
        ("00" + n.getDate()).slice(-2) +
        ("00" + n.getHours()).slice(-2) +
        ("00" + n.getMinutes()).slice(-2) +
        ("00" + n.getSeconds()).slice(-2);
      document.write('<link rel="stylesheet" href="/design-system/style.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/common.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/auth/verify/style.css?v=' + v + '">');
      document.write('<script src="/common.js?v=' + v + '"><\/script>');
      document.write('<script src="/auth/verify/script.js?v=' + v + '"><\/script>');
    })();
  </script>
</head>
<body>
  <div class="layout-auth">
    <header class="header header--primary">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="logo-text">ネザー<span>ID</span></span>
        </a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <!-- <div class="auth-card-brand">
          <div class="logo-mark logo-mark--center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="auth-card-brand-name">ネザーID</span>
        </div> -->

        <h1 class="auth-card-title">メールアドレスの認証</h1>
        <p class="auth-card-sub" id="js-subtitle">
          認証コードをメールにて送付しました。受信トレイをご確認ください。
        </p>

        <!-- <div class="step-indicator">
          <div class="step done" id="js-step-1">
            <span class="step-num">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 13l4 4L19 7"/>
              </svg>
            </span>
            <span class="step-label">アカウント情報</span>
          </div>
          <div class="step-connector"></div>
          <div class="step active" id="js-step-2">
            <span class="step-num">2</span>
            <span class="step-label">メール認証</span>
          </div>
        </div> -->

        <div id="js-alert" class="alert" style="display:none;margin-bottom:var(--space-5);"></div>

        <div class="verify-email-info" id="js-email-info" style="display:none;">
          <div class="verify-email-label">送信先メールアドレス</div>
          <div class="verify-email-value" id="js-email-display"></div>
        </div>

        <form id="js-verify-form" novalidate>
          <div class="form-group" style="margin-bottom:var(--space-6);">
            <label class="form-label" style="text-align:center;">認証コード（6桁）</label>
            <div class="code-input-wrap" id="js-code-inputs">
              <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" aria-label="認証コード1桁目">
              <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="認証コード2桁目">
              <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="認証コード3桁目">
              <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="認証コード4桁目">
              <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="認証コード5桁目">
              <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="認証コード6桁目">
            </div>
            <span class="form-error" id="js-code-error" style="display:none;text-align:center;justify-content:center;"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="js-submit">
            認証して完了する
          </button>
        </form>

        <div class="verify-note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>認証コードはメールにて送付されます。迷惑メールフォルダもご確認ください。</span>
        </div>

        <div class="auth-card-footer">
          <span class="auth-card-footer-text">コードが届かない場合は</span>
          <button type="button" class="auth-link auth-link--strong btn-text" id="js-resend">
            認証コードを再送する
          </button>
        </div>
      </div>
    </main>

    <footer class="footer footer--auth">
      <div class="footer-inner footer-inner--center">
        <div class="footer-links">
          <a href="/terms/" class="footer-link">利用規約</a>
          <a href="/privacy/" class="footer-link">プライバシーポリシー</a>
          <a href="/help/" class="footer-link">ヘルプ</a>
        </div>
        <p class="footer-copy">&copy; 2025 ネザーID. All rights reserved.</p>
      </div>
    </footer>
  </div>
</body>
</html>
