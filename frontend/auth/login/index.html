<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — ネザーID</title>
  <script src="/jquery-4.0.0.min.js"></script>
  <script>
    (function () {
      var n = new Date();
      var v = n.getFullYear() +
        ("00" + (n.getMonth() + 1)).slice(-2) +
        ("00" + n.getDate()).slice(-2) +
        ("00" + n.getHours()).slice(-2) +
        ("00" + n.getMinutes()).slice(-2) +
        ("00" + n.getSeconds()).slice(-2);
      document.write('<link rel="stylesheet" href="/design-system/style.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/auth/login/style.css?v=' + v + '">');
      document.write('<script src="/common.js?v=' + v + '"><\/script>');
      document.write('<script src="/auth/login/script.js?v=' + v + '"><\/script>');
    })();
  </script>
</head>
<body>
  <div class="layout-auth">

    <header class="header header--primary">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="logo-text">ネザー<span>ID</span></span>
        </a>
        <div class="header-actions">
          <a href="/auth/register/" class="btn btn-white btn-sm">新規登録（無料）</a>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">

        <h1 class="auth-card-title heading--lp">ログイン</h1>
        <p class="auth-card-sub">ご利用にはネザーIDのログインが必要です。</p>

        <!-- <p style="font-size:13px;color:var(--text-muted);margin-bottom:24px;">
          <a href="/auth/register/" style="color:var(--primary);font-weight:600;text-decoration:none;">新規登録（メールアドレスのみ、30秒登録！）</a>
        </p> -->

        <div id="js-alert" class="alert" style="display:none;margin-bottom:20px;"></div>

        <form id="js-login-form" novalidate>

          <div class="form-group" style="margin-bottom:20px;">
            <label class="form-label" for="email">
              メールアドレス <span class="required">必須</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="example@email.com"
              autocomplete="email"
              required
            >
            <span class="form-error" id="js-email-error" style="display:none;"></span>
          </div>

          <div class="form-group" style="margin-bottom:12px;">
            <label class="form-label" for="js-password">
              パスワード <span class="required">必須</span>
            </label>
            <div class="input-wrap">
              <input
                type="password"
                id="js-password"
                name="password"
                class="form-input"
                placeholder="パスワードを入力"
                autocomplete="current-password"
                required
              >
              <button type="button" class="input-icon-btn" id="js-pw-toggle" aria-label="パスワードを表示">
                <svg id="js-icon-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="js-icon-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span class="form-error" id="js-password-error" style="display:none;"></span>
          </div>

          <a href="/auth/recovery/" class="login-recovery-link">ログイン情報をお忘れの場合はこちら</a>

          <button type="submit" class="btn btn-primary btn-full" id="js-submit" style="font-size:15px;padding:14px 20px;margin-top:24px;">
            ログインする
          </button>

        </form>
<!-- 
        <div class="auth-divider" style="margin-top:24px;">
          <span>サポート</span>
        </div>

        <p style="font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:16px;">
          わからないことは「マニュアル・よくある質問」ですぐ解決するかも
        </p>
        <div style="display:flex;gap:10px;justify-content:center;">
          <a href="/help/faq/" class="btn btn-outline btn-sm">よくある質問を見る</a>
          <a href="/help/ai/" class="btn btn-primary btn-sm">AIに質問する</a>
        </div> -->

      </div>
    </main>

    <footer class="auth-footer">
      <a href="/terms/">利用規約</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <a href="/help/">ヘルプ</a>
      <span class="auth-footer-copy">© 2026 ネザーID</span>
    </footer>

  </div>
</body>
</html>
