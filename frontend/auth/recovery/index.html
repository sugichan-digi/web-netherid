<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの再設定 — ネザーID</title>
  <script src="/jquery-4.0.0.min.js"></script>
  <script>
    (function () {
      var n = new Date();
      var v = n.getFullYear() +
        ("00" + (n.getMonth() + 1)).slice(-2) +
        ("00" + n.getDate()).slice(-2) +
        ("00" + n.getHours()).slice(-2) +
        ("00" + n.getMinutes()).slice(-2) +
        ("00" + n.getSeconds()).slice(-2);
      document.write('<link rel="stylesheet" href="/design-system/style.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/common.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/auth/recovery/style.css?v=' + v + '">');
      document.write('<script src="/common.js?v=' + v + '"><\/script>');
      document.write('<script src="/auth/recovery/script.js?v=' + v + '"><\/script>');
    })();
  </script>
</head>
<body>
  <div class="layout-auth">
    <header class="header header--primary">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="logo-text">ネザー<span>ID</span></span>
        </a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-card-brand">
          <div class="logo-mark logo-mark--center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="auth-card-brand-name">ネザーID</span>
        </div>

        <h1 class="auth-card-title">パスワードの再設定</h1>
        <p class="auth-card-sub">登録済みのメールアドレスに認証コードを送信します</p>

        <div class="alert alert-info" style="margin-bottom:var(--space-5);">
          <div class="alert-content">
            登録済みのメールアドレスを入力してください。認証コードをメールにてお送りします。
          </div>
        </div>

        <div id="js-alert" class="alert" style="display:none;margin-bottom:var(--space-5);"></div>

        <form id="js-recovery-form" novalidate>
          <div class="form-group" style="margin-bottom:var(--space-6);">
            <label class="form-label" for="email">
              メールアドレス
              <span class="required">*</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
            <span class="form-error" id="js-email-error" style="display:none;"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="js-submit">
            認証コードを送信
          </button>
        </form>

        <div class="auth-card-footer">
          <a href="/auth/login/" class="auth-link auth-back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5"/>
              <path d="M12 19l-7-7 7-7"/>
            </svg>
            ログイン画面に戻る
          </a>
        </div>
      </div>
    </main>

    <footer class="footer footer--auth">
      <div class="footer-inner footer-inner--center">
        <div class="footer-links">
          <a href="/terms/" class="footer-link">利用規約</a>
          <a href="/privacy/" class="footer-link">プライバシーポリシー</a>
          <a href="/help/" class="footer-link">ヘルプ</a>
        </div>
        <p class="footer-copy">&copy; 2025 ネザーID. All rights reserved.</p>
      </div>
    </footer>
  </div>
</body>
</html>
