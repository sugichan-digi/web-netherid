<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードの再設定 — ネザーID</title>
  <script src="/jquery-4.0.0.min.js"></script>
  <script>
    (function () {
      var n = new Date();
      var v = n.getFullYear() +
        ("00" + (n.getMonth() + 1)).slice(-2) +
        ("00" + n.getDate()).slice(-2) +
        ("00" + n.getHours()).slice(-2) +
        ("00" + n.getMinutes()).slice(-2) +
        ("00" + n.getSeconds()).slice(-2);
      document.write('<link rel="stylesheet" href="/design-system/style.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/common.css?v=' + v + '">');
      document.write('<link rel="stylesheet" href="/password-reset/style.css?v=' + v + '">');
      document.write('<script src="/common.js?v=' + v + '"><\/script>');
      document.write('<script src="/password-reset/script.js?v=' + v + '"><\/script>');
    })();
  </script>
</head>
<body>
  <div class="layout-auth">
    <header class="header header--primary">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="logo-text">ネザー<span>ID</span></span>
        </a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-card-brand">
          <div class="logo-mark logo-mark--center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M4 4h4l8 12h4V20h-4L8 8H4V4z"/>
            </svg>
          </div>
          <span class="auth-card-brand-name">ネザーID</span>
        </div>

        <h1 class="auth-card-title">パスワードの再設定</h1>
        <p class="auth-card-sub" id="js-subtitle">メールに届いたリカバリコードを入力してください</p>

        <div id="js-alert" class="alert" style="display:none;margin-bottom:var(--space-5);"></div>

        <div class="reset-email-info" id="js-email-info" style="display:none;">
          <div class="reset-email-label">リカバリコードの送信先</div>
          <div class="reset-email-value" id="js-email-display"></div>
        </div>

        <div id="js-step-code">
          <form id="js-code-form" novalidate>
            <div class="form-group" style="margin-bottom:var(--space-6);">
              <label class="form-label" style="text-align:center;">リカバリコード（6桁）</label>
              <div class="code-input-wrap" id="js-code-inputs">
                <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" aria-label="コード1桁目">
                <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="コード2桁目">
                <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="コード3桁目">
                <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="コード4桁目">
                <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="コード5桁目">
                <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="コード6桁目">
              </div>
              <span class="form-error" id="js-code-error" style="display:none;text-align:center;justify-content:center;"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" id="js-code-submit">
              コードを確認する
            </button>
          </form>

          <div class="verify-note">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>迷惑メールフォルダもご確認ください。コードの有効期限は送信から30分です。</span>
          </div>
        </div>

        <div id="js-step-password" style="display:none;">
          <div class="reset-step-success">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <path d="M22 4L12 14.01l-3-3"/>
            </svg>
            <span>コードを確認しました。新しいパスワードを設定してください。</span>
          </div>

          <form id="js-password-form" novalidate>
            <div class="form-group" style="margin-bottom:var(--space-2);">
              <label class="form-label" for="new-password">
                新しいパスワード
                <span class="required">*</span>
              </label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="new-password"
                  name="new_password"
                  class="form-input"
                  placeholder="8文字以上"
                  autocomplete="new-password"
                  required
                >
                <span class="input-suffix">
                  <button type="button" class="input-toggle-pw" id="js-toggle-pw" aria-label="パスワードを表示">
                    <svg id="js-eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="js-eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                      <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                </span>
              </div>
              <span class="form-error" id="js-new-password-error" style="display:none;"></span>
            </div>

            <div class="pw-strength" id="js-pw-strength" style="margin-bottom:var(--space-5);">
              <div class="pw-strength-bar">
                <div class="pw-strength-fill" id="js-pw-strength-fill"></div>
              </div>
              <span class="pw-strength-label" id="js-pw-strength-label"></span>
            </div>

            <div class="form-group" style="margin-bottom:var(--space-6);">
              <label class="form-label" for="confirm-password">
                新しいパスワード（確認）
                <span class="required">*</span>
              </label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="confirm-password"
                  name="confirm_password"
                  class="form-input"
                  placeholder="パスワードを再入力"
                  autocomplete="new-password"
                  required
                >
                <span class="input-suffix">
                  <button type="button" class="input-toggle-pw" id="js-toggle-pw-confirm" aria-label="パスワードを表示">
                    <svg id="js-eye-icon-confirm" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="js-eye-off-icon-confirm" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                      <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                </span>
              </div>
              <span class="form-error" id="js-confirm-password-error" style="display:none;"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" id="js-password-submit">
              パスワードを再設定する
            </button>
          </form>
        </div>

        <div class="auth-card-footer">
          <a href="/login/" class="auth-link auth-back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5"/>
              <path d="M12 19l-7-7 7-7"/>
            </svg>
            ログイン画面に戻る
          </a>
        </div>
      </div>
    </main>

    <footer class="footer footer--auth">
      <div class="footer-inner footer-inner--center">
        <div class="footer-links">
          <a href="/terms/" class="footer-link">利用規約</a>
          <a href="/privacy/" class="footer-link">プライバシーポリシー</a>
          <a href="/help/" class="footer-link">ヘルプ</a>
        </div>
        <p class="footer-copy">&copy; 2025 ネザーID. All rights reserved.</p>
      </div>
    </footer>
  </div>
</body>
</html>
